name: Build and Release

on:
  push:
    branches:
      - release

jobs:
  build:
    name: Build AAR and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle wrapper jar
        run: |
          curl -fSL \
            "https://services.gradle.org/distributions/gradle-8.9-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          sha256sum gradle/wrapper/gradle-wrapper.jar

      - name: Read OpenSSL version
        id: version
        run: |
          VERSION=$(grep '^openssl' gradle/libs.versions.toml \
            | sed 's/.*= *"\(.*\)"/\1/')
          echo "openssl_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=openssl-$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=OpenSSL $VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          NDK_VERSION=$(grep '^ndkVersion' gradle/libs.versions.toml \
            | sed 's/.*= *"\(.*\)"/\1/')
          echo "y" | sdkmanager "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Build static AAR
        run: ./gradlew publishReleasePublicationToLocalRepository

      - name: Build shared AAR
        run: ./gradlew publishReleasePublicationToLocalRepository -PbuildShared=true

      - name: List repository artifacts
        run: ls -lh build/repository/

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          NAME="${{ steps.version.outputs.release_name }}"

          # Create the release (and tag) if it doesn't already exist
          gh release create "$TAG" \
            --title "$NAME" \
            --notes "Prefab AAR for OpenSSL ${{ steps.version.outputs.openssl_version }} targeting Android.

          **Artifacts**
          - \`*-openssl-*.aar\` — static library build (link into your binary)
          - \`*-openssl-shared-*.aar\` — shared library build (bundled as \`.so\` at runtime)
          - \`*.ivy\` — Ivy descriptor files for dependency resolution

          **Consuming via Gradle (Ivy repository)**
          \`\`\`kotlin
          repositories {
              ivy {
                  url = uri(\"https://github.com/${{ github.repository }}/releases/download/$TAG\")
                  patternLayout {
                      artifact(\"[organisation]-[module]-[revision].[ext]\")
                      ivy(\"[organisation]-[module]-[revision].ivy\")
                  }
                  metadataSources { ivyDescriptor() }
              }
          }
          dependencies {
              // Static:
              implementation(\"de.wellenvogel.android.ndk.thirdparty:openssl:${{ steps.version.outputs.openssl_version }}-1@aar\")
              // Shared:
              // implementation(\"de.wellenvogel.android.ndk.thirdparty:openssl-shared:${{ steps.version.outputs.openssl_version }}-1@aar\")
          }
          \`\`\`" \
            --target release \
            build/repository/*
