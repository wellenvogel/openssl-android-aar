name: Build and Release

on:
  push:
    branches:
      - release

jobs:
  build:
    name: Build AAR and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Read versions from TOML
        id: version
        run: |
          python3 - << 'EOF'
          import tomllib, os

          with open("gradle/libs.versions.toml", "rb") as f:
              toml = tomllib.load(f)

          versions = toml["versions"]
          openssl_version = versions["openssl"]
          ndk_version     = versions["ndkVersion"]

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"openssl_version={openssl_version}\n")
              out.write(f"ndk_version={ndk_version}\n")
              out.write(f"tag_name={openssl_version}\n")
              out.write(f"release_name={openssl_version}\n")
          EOF

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;${{ steps.version.outputs.ndk_version }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ steps.version.outputs.ndk_version }}" >> "$GITHUB_ENV"

      - name: Build static AAR
        run: ./gradlew publishReleasePublicationToLocalRepository

      - name: Build shared AAR
        run: ./gradlew publishReleasePublicationToLocalRepository -PbuildShared=true

      - name: List repository artifacts
        run: ls -lh build/repository/

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag_name }}"
          VERSION="${{ steps.version.outputs.openssl_version }}"

          gh release create "$TAG" \
            --title "$TAG" \
            --target release \
            --notes "Prefab AAR for OpenSSL ${VERSION} targeting Android.

          **Artifacts**
          - \`*-openssl-*.aar\` — static library build (link into your binary)
          - \`*-openssl-shared-*.aar\` — shared library build (bundled as \`.so\` at runtime)
          - \`*.ivy\` — Ivy descriptor files for dependency resolution

          **Consuming via Gradle (Ivy repository)**
          \`\`\`kotlin
          repositories {
              ivy {
                  url = uri(\"https://github.com/${{ github.repository }}/releases/download/${TAG}\")
                  patternLayout {
                      artifact(\"[organisation]-[module]-[revision].[ext]\")
                      ivy(\"[organisation]-[module]-[revision].ivy\")
                  }
                  metadataSources { ivyDescriptor() }
              }
          }
          dependencies {
              // Static:
              implementation(\"de.wellenvogel.android.ndk.thirdparty:openssl:${VERSION}-1@aar\")
              // Shared:
              // implementation(\"de.wellenvogel.android.ndk.thirdparty:openssl-shared:${VERSION}-1@aar\")
          }
          \`\`\`" \
            build/repository/*
